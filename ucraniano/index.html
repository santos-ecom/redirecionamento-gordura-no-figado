<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
  <script>
    (function() {
      var destinoBase = "https://lifeeasyebooks.shop/uk/pages/gordura-ucraniano";
      var params = window.location.search;
      if (params) {
        var separador = destinoBase.indexOf("?") !== -1 ? "&" : "?";
        window.location.replace(destinoBase + separador + params.substring(1));
      } else {
        window.location.replace(destinoBase);
      }
    })();
  </script>
</head>
<body></body>
</html>
